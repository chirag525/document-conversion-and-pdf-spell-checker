name: pdf_spell_checker_app
description: "Document Processing Suite - Flutter + GetX"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 State Management
  get: ^4.6.6

  # 🌐 API Calls
  http: ^1.2.1

  # 📁 File Picker (select pdf, docx, images, etc.)
  file_picker: ^8.0.0

  # 💾 Save downloaded files
  path_provider: ^2.1.2

  # 🔓 Permission handling (Android storage access)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
